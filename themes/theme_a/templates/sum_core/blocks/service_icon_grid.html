{% load wagtailcore_tags %}

<section class="{% if self.tone == 'dark' %}bg-sage-black text-sage-linen{% elif self.tone == 'muted' %}bg-sage-oat text-sage-black{% else %}bg-sage-linen text-sage-black{% endif %} {% if self.density == 'compact' %}py-14 md:py-20{% elif self.density == 'spacious' %}py-28 md:py-40{% else %}py-24 md:py-32{% endif %} section-tone-{{ self.tone|default:'light' }} section-density-{{ self.density|default:'regular' }}"{% if section_id %} data-section-id="{{ section_id }}"{% endif %} data-tone="{{ self.tone|default:'light' }}" data-density="{{ self.density|default:'regular' }}">
    <div class="max-w-7xl mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            {% for item in self.items %}
                <div class="bg-sage-linen p-8 border border-sage-black/10">
                    <div class="mb-6 text-sage-terra">
                        {{ item.icon_svg|safe }}
                    </div>
                    <h3 class="font-display text-2xl text-sage-black mb-4">{{ item.title }}</h3>
                    <div class="text-base text-sage-label mb-6 leading-relaxed">
                        {{ item.description|richtext }}
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</section>
