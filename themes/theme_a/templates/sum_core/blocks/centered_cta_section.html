{% load wagtailcore_tags %}

<section class="{% if self.tone == 'dark' %}bg-sage-black text-sage-linen{% elif self.tone == 'muted' %}bg-sage-oat text-sage-black{% else %}bg-sage-linen text-sage-black{% endif %} {% if self.density == 'compact' %}py-14 md:py-20{% elif self.density == 'spacious' %}py-28 md:py-40{% else %}py-24 md:py-32{% endif %} border-t {% if self.tone == 'dark' %}border-sage-linen/10{% else %}border-sage-black/10{% endif %} section-tone-{{ self.tone|default:'dark' }} section-density-{{ self.density|default:'regular' }}"{% if section_id %} data-section-id="{{ section_id }}"{% endif %} data-tone="{{ self.tone|default:'dark' }}" data-density="{{ self.density|default:'regular' }}">
    <div class="max-w-4xl mx-auto px-6 text-center">
        {% if self.eyebrow %}
            <span class="block text-sage-terra font-accent italic text-xl mb-4">
                {{ self.eyebrow }}
            </span>
        {% endif %}

        <div class="font-display text-3xl md:text-5xl {% if self.tone|default:'dark' == 'dark' %}text-sage-linen{% else %}text-sage-black{% endif %} mb-10">
            {{ self.heading|richtext }}
        </div>

        {% if self.cta_link %}
            <a
                href="{{ self.cta_link.href }}"
                {{ self.cta_link.attrs_str }}
                class="inline-flex items-center justify-center mx-auto bg-sage-terra text-white px-12 py-5 text-sm uppercase tracking-[0.2em] font-bold hover:bg-white hover:text-sage-black transition-colors duration-300 shadow-xl focus:outline-none focus:ring-4 focus:ring-white/50 focus:ring-offset-2 focus:ring-offset-sage-black"
            >
                {% if self.cta_label %}
                    {{ self.cta_label }}
                {% else %}
                    {{ self.cta_link.text }}
                {% endif %}
            </a>
        {% endif %}
    </div>
</section>
